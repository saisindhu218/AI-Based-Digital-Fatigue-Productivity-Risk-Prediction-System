<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FatigueGuard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== RESET & BASE STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ========== AUTH CONTAINER ========== */
        .auth-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            min-height: 700px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* ========== LEFT SIDE ========== */
        .auth-left {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-left-content {
            max-width: 500px;
        }

        .auth-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .auth-title i {
            display: block;
            margin-bottom: 15px;
            font-size: 3rem;
        }

        .auth-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .feature-icon {
            font-size: 24px;
            margin-right: 15px;
            margin-top: 5px;
            color: rgba(255, 255, 255, 0.9);
        }

        .feature-item h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: white;
        }

        .feature-item p {
            font-size: 0.95rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        /* ========== RIGHT SIDE ========== */
        .auth-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .auth-logo h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .auth-logo p {
            color: #666;
            font-size: 15px;
        }

        /* ========== FORM STYLES ========== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-input::placeholder {
            color: #999;
        }

        /* ========== PASSWORD STRENGTH ========== */
        .password-strength {
            margin-top: 8px;
            font-size: 13px;
        }

        .strength-bar {
            height: 4px;
            background: #e1e5e9;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* ========== CHECKBOX ========== */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            margin-top: 3px;
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            color: #555;
            font-size: 14px;
            line-height: 1.4;
            cursor: pointer;
        }

        .checkbox-group a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        /* ========== BUTTON STYLES ========== */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #555;
            border: 2px solid #e1e5e9;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        /* ========== ERROR & MESSAGES ========== */
        .error-message {
            background: #fee;
            color: #e74c3c;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #e74c3c;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #28a745;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* ========== DIVIDER ========== */
        .auth-divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e1e5e9;
        }

        .auth-divider span {
            background: white;
            padding: 0 15px;
            color: #666;
            font-size: 14px;
            position: relative;
        }

        /* ========== FOOTER ========== */
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* ========== RESPONSIVE DESIGN ========== */
        @media (max-width: 992px) {
            .auth-container {
                flex-direction: column;
                min-height: auto;
            }

            .auth-left {
                padding: 40px;
            }

            .auth-right {
                padding: 40px 20px;
            }

            .auth-title {
                font-size: 2rem;
            }

            .auth-subtitle {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 576px) {
            body {
                padding: 10px;
            }

            .auth-container {
                border-radius: 15px;
            }

            .auth-left {
                padding: 30px 20px;
            }

            .auth-right {
                padding: 30px 15px;
            }

            .auth-title {
                font-size: 1.8rem;
            }

            .auth-subtitle {
                font-size: 1rem;
            }

            .feature-item {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">

    <!-- LEFT SIDE -->
    <div class="auth-left">
        <div class="auth-left-content">
            <h1 class="auth-title">
                <i class="fas fa-brain"></i>
                Join FatigueGuard
            </h1>

            <p class="auth-subtitle">
                Start your journey to better digital wellness and productivity.
            </p>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-right">
        <div class="auth-card">

            <div class="auth-logo">
                <i class="fas fa-user-plus"></i>
                <h1>Create Account</h1>
                <p>Start your digital wellness journey</p>
            </div>

            <div id="error-message" class="error-message"></div>

            <form id="register-form">

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user"></i> Full Name
                    </label>
                    <input type="text" id="full-name" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="email" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" class="form-input" required minlength="6">

                    <!-- Password Strength -->
                    <div class="password-strength">
                        <span id="strength-text">Password strength</span>
                        <div class="strength-bar">
                            <div id="strength-fill" class="strength-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    <input type="password" id="confirm-password" class="form-input" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        I agree to Terms & Privacy Policy
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">
                    Create Account
                </button>

            </form>

            <div class="auth-divider">
                <span>Already have an account?</span>
            </div>

            <a href="login.html" class="btn btn-secondary">
                Sign In Instead
            </a>

        </div>
    </div>

</div>

<!-- PASSWORD STRENGTH SCRIPT ONLY -->
<script>
document.getElementById('password').addEventListener('input', function(e) {
    const password = e.target.value;
    const strengthText = document.getElementById('strength-text');
    const strengthFill = document.getElementById('strength-fill');

    let strength = 0;
    let color = '#dc3545';
    let text = 'Weak password';

    if (password.length >= 6) strength += 25;
    if (/[A-Z]/.test(password)) strength += 25;
    if (/[0-9]/.test(password)) strength += 25;
    if (/[^A-Za-z0-9]/.test(password)) strength += 25;

    if (strength >= 75) {
        text = 'Strong password';
        color = '#28a745';
    } else if (strength >= 50) {
        text = 'Good password';
        color = '#ffc107';
    } else if (strength >= 25) {
        text = 'Fair password';
        color = '#fd7e14';
    }

    strengthText.textContent = text;
    strengthFill.style.width = strength + '%';
    strengthFill.style.backgroundColor = color;
});
</script>

<!-- THIS IS IMPORTANT -->
<script src="./js/auth.js"></script>
</body>
</html>
